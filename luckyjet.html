<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lucky Jet — Auto Signal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0b1e;
    --surface: #1a1432;
    --surface2: #231c42;
    --accent: #a855f7;
    --accent-glow: #c084fc;
    --green: #22c55e;
    --green-glow: #4ade80;
    --red: #ef4444;
    --text: #f1f0f5;
    --text-dim: #8b83a8;
    --gold: #fbbf24;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 50% 30%, rgba(168,85,247,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 300px 300px at 80% 70%, rgba(139,131,168,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    position: relative; z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 16px;
  }

  .header { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .logo { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
  .logo span { color: var(--accent-glow); }

  /* История КФ */
  .history-bar { 
    display: flex; 
    gap: 6px; 
    margin-bottom: 16px; 
    overflow-x: auto; 
    padding-bottom: 4px; 
    scrollbar-width: none; 
    min-height: 32px;
    justify-content: flex-start;
  }
  .history-bar::-webkit-scrollbar { display: none; }
  .history-chip { flex-shrink: 0; padding: 6px 12px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; background: var(--surface2); color: var(--text-dim); border: 1px solid transparent; animation: slideIn 0.3s ease-out; }
  .history-chip.high { background: rgba(168,85,247,0.2); color: var(--accent-glow); border-color: rgba(168,85,247,0.3); }
  .history-chip.mega { background: rgba(251,191,36,0.15); color: var(--gold); border-color: rgba(251,191,36,0.3); }

  /* Карточка сигнала */
  .signal-card { 
    background: var(--surface); 
    border: 1px solid rgba(168,85,247,0.2); 
    border-radius: 24px; 
    padding: 32px 24px; 
    text-align: center; 
    margin-bottom: 16px; 
    position: relative; 
    overflow: hidden; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  .signal-card.waiting::before { display: none; }
  .signal-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(from 0deg, transparent 0deg, rgba(168,85,247,0.08) 60deg, transparent 120deg); animation: rotate-bg 8s linear infinite; pointer-events: none; }
  @keyframes rotate-bg { to { transform: rotate(360deg); } }
  .signal-card > * { position: relative; z-index: 1; }
  
  .signal-label { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; transition: color 0.3s; }
  .signal-coeff { font-family: 'JetBrains Mono', monospace; font-size: 64px; font-weight: 700; color: var(--accent-glow); text-shadow: 0 0 40px rgba(168,85,247,0.4); line-height: 1; margin-bottom: 10px; opacity: 0; transform: scale(0.5); transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .signal-coeff.visible { opacity: 1; transform: scale(1); }
  
  .confidence { display: flex; align-items: center; gap: 10px; margin-top: 15px; padding: 0 10px; opacity: 0; transition: opacity 0.3s; }
  .confidence.visible { opacity: 1; }
  .confidence-bar-bg { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .confidence-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--green), var(--green-glow)); width: 0%; transition: width 1s ease; }
  .confidence-pct { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--green); min-width: 40px; text-align: right; }
  
  .signal-hint { font-size: 14px; color: var(--text-dim); margin-top: 16px; }
  .signal-hint strong { color: var(--green); }

  /* Статус реальной игры */
  .live-status-block {
    background: rgba(0, 0, 0, 0.4);
    border-radius: 16px;
    padding: 16px;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.05);
  }
  .live-indicator {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
  }
  .dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1s infinite; }
  .live-coeff {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
  }

  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">LUCKY<span>JET</span></div>
  </div>

  <div class="history-bar" id="historyBar"></div>

  <div class="signal-card waiting" id="signalCard">
    <div class="signal-label" id="signalLabel">Подключение к серверу...</div>
    <div class="signal-coeff" id="signalCoeff">—</div>
    
    <div class="confidence" id="confidenceBlock">
      <div class="confidence-bar-bg"><div class="confidence-bar-fill" id="confFill"></div></div>
      <div class="confidence-pct" id="confPct">0%</div>
    </div>
    
    <div class="signal-hint" id="signalHint">Ожидание данных игры</div>
  </div>

  <div class="live-status-block">
    <div class="live-indicator">
      <div class="dot" id="liveDot"></div>
      <span id="liveText">Оффлайн</span>
    </div>
    <div class="live-coeff" id="liveCoeff">x1.00</div>
  </div>

</div>

<script>
  // --- НАСТРОЙКИ ---
  // Вставь свой токен и название канала, которые ты нашел в консоли разработчика
  const WS_URL = 'wss://crash-gateway-grm-cr.gamedev-tech.cc/websocket/secondary';
  const AUTH_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3NzUxODg3MTQsImlhdCI6MTc3NDkyOTUxNCwic3ViIjoiNDI0Mjc0MzEiLCJjaGFubmVscyI6WyJsdWNreS1qZXQtOTQiXX0.olNuIsRg0-UUK0vHlCO1LmmDN7YWcysICr7HgJf1lpI'; 
  const CHANNEL_NAME = 'lucky-jet-94'; // Замени, если на скрине был другой номер (например lucky-jet-95)

  // Элементы UI (Прогноз)
  const signalCard = document.getElementById('signalCard');
  const labelEl = document.getElementById('signalLabel');
  const coeffEl = document.getElementById('signalCoeff');
  const confBlock = document.getElementById('confidenceBlock');
  const confFill = document.getElementById('confFill');
  const confPct = document.getElementById('confPct');
  const hintEl = document.getElementById('signalHint');
  const historyBar = document.getElementById('historyBar');

  // Элементы UI (Реальная игра)
  const liveDot = document.getElementById('liveDot');
  const liveText = document.getElementById('liveText');
  const liveCoeff = document.getElementById('liveCoeff');

  let isRoundActive = false;
  let ws;

  // Генерация фейкового прогноза
  function getRealisticCoeff() {
    const chance = Math.random() * 100;
    if (chance < 25) return (Math.random() * (1.50 - 1.10) + 1.10).toFixed(2);
    if (chance < 65) return (Math.random() * (3.00 - 1.51) + 1.51).toFixed(2);
    if (chance < 90) return (Math.random() * (10.00 - 3.01) + 3.01).toFixed(2);
    return (Math.random() * (30.00 - 10.01) + 10.01).toFixed(2);
  }

  function addHistoryChip(multiplier) {
    const num = parseFloat(multiplier);
    const chip = document.createElement('div');
    chip.className = 'history-chip' + (num >= 10 ? ' mega' : num >= 2 ? ' high' : '');
    chip.textContent = num.toFixed(2) + 'x';
    historyBar.insertBefore(chip, historyBar.firstChild);
    if (historyBar.children.length > 15) historyBar.removeChild(historyBar.lastChild);
  }

  // Запуск интерфейса начала раунда
  function startRoundSignal() {
    isRoundActive = true;
    signalCard.classList.remove('waiting');
    
    // Генерируем прогноз
    const forecastedCoeff = getRealisticCoeff();
    const confidence = Math.floor(Math.random() * (99 - 88 + 1)) + 88;

    labelEl.textContent = 'Успешный анализ';
    labelEl.style.color = 'var(--green)';
    
    coeffEl.textContent = 'x' + forecastedCoeff;
    coeffEl.classList.add('visible');
    
    confBlock.classList.add('visible');
    confFill.style.width = confidence + '%';
    confPct.textContent = confidence + '%';
    
    hintEl.innerHTML = 'Забирай на <strong>x' + forecastedCoeff + '</strong>';

    // Обновляем статус реальной игры
    liveDot.classList.add('active');
    liveText.textContent = 'Раунд идет';
  }

  // Завершение раунда (краш)
  function endRoundSignal(crashedAt) {
    isRoundActive = false;
    signalCard.classList.add('waiting');
    
    labelEl.textContent = 'Ожидание начала раунда';
    labelEl.style.color = 'var(--text-dim)';
    
    coeffEl.classList.remove('visible');
    confBlock.classList.remove('visible');
    hintEl.innerHTML = 'Анализ начнется автоматически...';

    // Заносим реальный икс в историю
    if (crashedAt) {
      addHistoryChip(crashedAt);
    }

    // Обновляем статус реальной игры
    liveDot.classList.remove('active');
    liveText.textContent = 'Игра завершена (Краш)';
    liveCoeff.style.color = 'var(--red)';
  }

  // --- ЛОГИКА WEBSOCKET ---
  function connectWebSocket() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      console.log('Подключено к серверу!');
      labelEl.textContent = 'Синхронизация данных...';
      
      // 1. Отправляем токен для авторизации
      ws.send(JSON.stringify({
        connect: { token: AUTH_TOKEN },
        id: 1
      }));

      // 2. Через секунду подписываемся на канал с игрой
      setTimeout(() => {
        ws.send(JSON.stringify({
          id: 2,
          subscribe: { channel: CHANNEL_NAME }
        }));
        labelEl.textContent = 'Ожидание начала раунда';
        liveText.textContent = 'Ожидание игры...';
      }, 1000);
    };

    ws.onmessage = (event) => {
      try {
        const message = JSON.parse(event.data);

        // Ищем пуши с данными
        if (message.push && message.push.pub && message.push.pub.data) {
          const gameData = message.push.pub.data;

          // Событие: Изменение коэффициента (ракета летит)
          if (gameData.eventType === "changeCoefficient") {
            const currentLiveMultiplier = gameData.next[0];
            
            // Если раунд еще не отмечен как активный, запускаем сигнал
            if (!isRoundActive) {
              startRoundSignal();
              liveCoeff.style.color = '#fff';
            }

            // Обновляем цифру реального полета внизу
            liveCoeff.textContent = 'x' + parseFloat(currentLiveMultiplier).toFixed(2);
          }

          // Событие: Конец раунда (краш)
          // Примечание: название eventType может быть "roundFinished" или "crash". 
          // Если оно отличается, поправь строку ниже.
          if (gameData.eventType === "roundFinished" || gameData.eventType === "crash") {
            const finalMultiplier = liveCoeff.textContent.replace('x', ''); // Берем последнее значение с экрана
            endRoundSignal(finalMultiplier);
          }
        }
      } catch (e) {
        console.error("Ошибка обработки пакета:", e);
      }
    };

    ws.onclose = () => {
      liveText.textContent = 'Соединение потеряно, переподключение...';
      liveDot.classList.remove('active');
      setTimeout(connectWebSocket, 3000); // Авто-реконнект
    };
  }

  // Запускаем подключение при загрузке страницы
  window.onload = () => {
    connectWebSocket();
  };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lucky Jet — Signal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0b1e;
    --surface: #1a1432;
    --surface2: #231c42;
    --accent: #a855f7;
    --accent-glow: #c084fc;
    --green: #22c55e;
    --green-glow: #4ade80;
    --red: #ef4444;
    --text: #f1f0f5;
    --text-dim: #8b83a8;
    --gold: #fbbf24;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 50% 30%, rgba(168,85,247,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 300px 300px at 80% 70%, rgba(139,131,168,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    position: relative; z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 16px;
  }

  .header { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .logo { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
  .logo span { color: var(--accent-glow); }

  .history-bar { 
    display: flex; 
    gap: 6px; 
    margin-bottom: 16px; 
    overflow-x: auto; 
    padding-bottom: 4px; 
    scrollbar-width: none; 
    min-height: 32px;
    justify-content: center;
  }
  .history-bar::-webkit-scrollbar { display: none; }
  .history-chip { flex-shrink: 0; padding: 6px 12px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; background: var(--surface2); color: var(--text-dim); border: 1px solid transparent; animation: slideIn 0.3s ease-out; }
  .history-chip.high { background: rgba(168,85,247,0.2); color: var(--accent-glow); border-color: rgba(168,85,247,0.3); }
  .history-chip.mega { background: rgba(251,191,36,0.15); color: var(--gold); border-color: rgba(251,191,36,0.3); }

  .signal-card { 
    background: var(--surface); 
    border: 1px solid rgba(168,85,247,0.2); 
    border-radius: 24px; 
    padding: 32px 24px; 
    text-align: center; 
    margin-bottom: 16px; 
    position: relative; 
    overflow: hidden; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  .signal-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(from 0deg, transparent 0deg, rgba(168,85,247,0.08) 60deg, transparent 120deg); animation: rotate-bg 8s linear infinite; pointer-events: none; }
  @keyframes rotate-bg { to { transform: rotate(360deg); } }
  .signal-card > * { position: relative; z-index: 1; }
  
  .signal-label { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
  .signal-coeff { font-family: 'JetBrains Mono', monospace; font-size: 64px; font-weight: 700; color: var(--accent-glow); text-shadow: 0 0 40px rgba(168,85,247,0.4); line-height: 1; margin-bottom: 10px; opacity: 0; transform: scale(0.5); transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .signal-coeff.visible { opacity: 1; transform: scale(1); }
  
  .confidence { display: flex; align-items: center; gap: 10px; margin-top: 15px; padding: 0 10px; }
  .confidence-bar-bg { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .confidence-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--green), var(--green-glow)); width: 0%; transition: width 1s ease; }
  .confidence-pct { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--green); min-width: 40px; text-align: right; }
  
  .signal-hint { font-size: 14px; color: var(--text-dim); margin-top: 16px; }
  .signal-hint strong { color: var(--green); }

  .result-block { display: none; gap: 12px; margin-bottom: 16px; }
  .result-block.visible { display: flex; }
  .result-btn { flex: 1; padding: 16px; border: none; border-radius: 16px; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .result-btn:active { transform: scale(0.96); }
  .result-btn.win { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
  .result-btn.lose { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }

  .streak-bar { background: var(--surface); border: 1px solid rgba(168,85,247,0.1); border-radius: 16px; padding: 12px 20px; margin-bottom: 16px; display: none; align-items: center; justify-content: space-between; }
  .streak-bar.visible { display: flex; }
  .streak-text { font-size: 14px; color: var(--text-dim); }
  .streak-text strong { color: var(--green); font-family: 'JetBrains Mono', monospace; }
  .streak-icons { display: flex; gap: 5px; }
  .streak-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--surface2); }
  .streak-dot.win { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.4); }
  .streak-dot.lose { background: var(--red); }

  .btn-signal { width: 100%; padding: 20px; border: none; border-radius: 20px; font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 800; cursor: pointer; color: #fff; background: linear-gradient(135deg, var(--accent), #7c3aed); box-shadow: 0 8px 25px rgba(168,85,247,0.3); transition: all 0.25s; text-transform: uppercase; letter-spacing: 1.5px; }
  .btn-signal:active { transform: translateY(2px); box-shadow: 0 4px 15px rgba(168,85,247,0.3); }
  .btn-signal:disabled { opacity: 0.6; cursor: not-allowed; }
  
  .btn-signal .loader { display: none; width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  .btn-signal.loading .loader { display: inline-block; }
  .btn-signal.loading .btn-text { display: none; }
  
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">LUCKY<span>JET</span></div>
  </div>

  <div class="history-bar" id="historyBar"></div>

  <div class="signal-card">
    <div class="signal-label">Сигнал — ожидание</div>
    <div class="signal-coeff" id="signalCoeff">—</div>
    <div class="confidence">
      <div class="confidence-bar-bg"><div class="confidence-bar-fill" id="confFill"></div></div>
      <div class="confidence-pct" id="confPct">0%</div>
    </div>
    <div class="signal-hint" id="signalHint">Нажми кнопку для получения сигнала</div>
  </div>

  <div class="result-block" id="resultBlock">
    <button class="result-btn win" onclick="recordResult(true)">✅ Выиграл</button>
    <button class="result-btn lose" onclick="recordResult(false)">❌ Проиграл</button>
  </div>

  <div class="streak-bar" id="streakBar">
    <div class="streak-text">Серия побед: <strong id="streakCount">0</strong></div>
    <div class="streak-icons" id="streakIcons"></div>
  </div>

  <button class="btn-signal" id="btnSignal" onclick="getSignal()">
    <span class="btn-text">🚀 Получить сигнал</span>
    <span class="loader"></span>
  </button>
</div>

<script>
  let streak = 0, results = [], signalActive = false;

  function initApp() {
    const coeffEl = document.getElementById('signalCoeff');
    const confFill = document.getElementById('confFill');
    const confPct = document.getElementById('confPct');
    const hintEl = document.getElementById('signalHint');
    const labelEl = document.querySelector('.signal-label');

    let lastCoeff = localStorage.getItem('lj_last_coeff');
    let lastConf = localStorage.getItem('lj_last_conf');

    if (lastCoeff && lastConf) {
      coeffEl.textContent = 'x' + lastCoeff;
      coeffEl.classList.add('visible');
      confFill.style.width = lastConf + '%';
      confPct.textContent = lastConf + '%';
      labelEl.textContent = 'Сигнал получен';
      hintEl.innerHTML = 'Забирай на <strong>x' + lastCoeff + '</strong>';
      document.getElementById('resultBlock').classList.add('visible');
      signalActive = true;
    }
  }

  // НОВАЯ МАТЕМАТИЧЕСКАЯ ФОРМУЛА
  function getRealisticCoeff() {
    const rand = Math.random();
    // Формула: 99 / (100 - X), имитирующая реальный алгоритм краш-игр
    // Добавляем дополнительные условия для баланса "адекватности"
    let result = 0.99 / (1 - rand);
    
    // Ограничиваем минимальный и максимальный порог для сигналов
    if (result < 1.10) result = 1.10 + (Math.random() * 0.2);
    
    // Шансы на распределение (чтобы лента выглядела как на 1win):
    const chance = Math.random() * 100;
    
    if (chance < 50) { 
      // 50% — коэффициенты 1.1 - 1.9 (лоу-риск)
      return Math.random() * (1.9 - 1.1) + 1.1;
    } else if (chance < 80) {
      // 30% — коэффициенты 2.0 - 4.5 (медиум)
      return Math.random() * (4.5 - 2.0) + 2.0;
    } else if (chance < 95) {
      // 15% — коэффициенты 4.6 - 10.0 (хай-риск)
      return Math.random() * (10.0 - 4.6) + 4.6;
    } else {
      // 5% — редкие заносы выше 10.0
      return Math.random() * (25.0 - 10.0) + 10.0;
    }
  }

  function getSignal() {
    if (signalActive) return;
    const btn = document.getElementById('btnSignal'), 
          coeff = document.getElementById('signalCoeff'), 
          cf = document.getElementById('confFill'), 
          cp = document.getElementById('confPct'), 
          rb = document.getElementById('resultBlock'),
          label = document.querySelector('.signal-label'),
          hint = document.getElementById('signalHint');

    btn.classList.add('loading'); btn.disabled = true;
    coeff.classList.remove('visible'); rb.classList.remove('visible');
    label.textContent = 'Анализируем...';

    // Случайная задержка "анализа" для солидности
    const delay = Math.floor(Math.random() * (2500 - 1500 + 1)) + 1500;

    setTimeout(() => {
      const c = getRealisticCoeff(); 
      const confidence = Math.floor(Math.random() * (98 - 89 + 1)) + 89;
      const cFixed = c.toFixed(2);

      coeff.textContent = 'x' + cFixed;
      coeff.classList.add('visible');
      cf.style.width = confidence + '%';
      cp.textContent = confidence + '%';
      label.textContent = 'Сигнал получен';
      hint.innerHTML = 'Забирай на <strong>x' + cFixed + '</strong>';
      
      localStorage.setItem('lj_last_coeff', cFixed);
      localStorage.setItem('lj_last_conf', confidence);

      btn.classList.remove('loading'); btn.disabled = false;
      signalActive = true;
      setTimeout(() => rb.classList.add('visible'), 400);

      // Обновление истории
      const bar = document.getElementById('historyBar'), chip = document.createElement('div');
      let type = '';
      if (c >= 10) type = ' mega';
      else if (c >= 2) type = ' high';
      
      chip.className = 'history-chip' + type;
      chip.textContent = cFixed + 'x';
      bar.insertBefore(chip, bar.firstChild);
      if (bar.children.length > 10) bar.removeChild(bar.lastChild);
    }, delay);
  }

  function recordResult(won) {
    signalActive = false;
    localStorage.removeItem('lj_last_coeff');
    localStorage.removeItem('lj_last_conf');

    document.getElementById('resultBlock').classList.remove('visible');
    document.querySelector('.signal-label').textContent = 'Сигнал — ожидание';
    document.getElementById('signalHint').textContent = 'Нажми кнопку для получения сигнала';
    
    if (won) streak++; else streak = 0;
    results.push(won); if (results.length > 10) results.shift();

    const sb = document.getElementById('streakBar');
    sb.classList.add('visible');
    document.getElementById('streakCount').textContent = streak;
    
    const si = document.getElementById('streakIcons'); si.innerHTML = '';
    results.forEach(w => {
      const d = document.createElement('div'); d.className = 'streak-dot ' + (w ? 'win' : 'lose');
      si.appendChild(d);
    });
  }

  initApp();
</script>
</body>
</html>

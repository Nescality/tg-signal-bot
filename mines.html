<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mines — Signal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0a1628;
    --surface: #0f1f38;
    --surface2: #162a4a;
    --accent: #06b6d4;
    --accent-glow: #22d3ee;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e8f4f8;
    --text-dim: #6b8fa8;
    --mine-bg: #0d2847;
    --mine-safe: #115e59;
    --mine-bomb: #7f1d1d;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 500px 350px at 50% 25%, rgba(6,182,212,.08) 0%, transparent 70%),
      radial-gradient(ellipse 300px 300px at 70% 80%, rgba(34,197,94,.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    padding: 16px;
  }

  .header { 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    margin-bottom: 16px; 
  }
  
  .logo { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
  .logo span { color: var(--accent-glow); }

  .grid-wrapper {
    background: var(--surface);
    border: 1px solid rgba(6,182,212,.15);
    border-radius: 24px;
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .grid-label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
    text-align: center;
  }

  .traps-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .traps-label { font-size: 13px; color: var(--text-dim); }
  .traps-val { 
    font-family: 'JetBrains Mono', monospace; 
    font-size: 18px; 
    font-weight: 700; 
    color: var(--accent-glow); 
    min-width: 24px; 
    text-align: center; 
  }

  .traps-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid rgba(6,182,212,.3);
    background: var(--surface2);
    color: var(--accent-glow);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .traps-btn:active { transform: scale(0.9); }

  .mine-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    max-width: 300px;
    margin: 0 auto;
  }

  .mine-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    background: var(--mine-bg);
    border: 2px solid rgba(6,182,212,.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: all 0.4s cubic-bezier(.34,1.56,.64,1);
  }

  .mine-cell.safe { background: var(--mine-safe); border-color: rgba(34,197,94,.4); transform: scale(1.05); }
  .mine-cell.bomb { background: var(--mine-bomb); border-color: rgba(239,68,68,.4); }
  .mine-cell.hidden { transform: scale(1); }

  .grid-info { font-size: 13px; color: var(--text-dim); text-align: center; margin-top: 14px; }
  .grid-info strong { color: var(--green); }

  .result-block { display: none; gap: 10px; margin-bottom: 12px; }
  .result-block.visible { display: flex; }
  
  .res-btn {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-family: 'Outfit';
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .res-btn.win { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.2); }
  .res-btn.lose { background: rgba(239,68,68,.12); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

  .streak {
    background: var(--surface);
    border: 1px solid rgba(34,197,94,0.1);
    border-radius: 14px;
    padding: 12px 18px;
    margin-bottom: 12px;
    display: none;
    align-items: center;
    justify-content: space-between;
  }
  .streak.visible { display: flex; }
  .streak-txt { font-size: 13px; color: var(--text-dim); }
  .streak-txt strong { color: var(--green); font-family: 'JetBrains Mono', monospace; }
  .streak-dots { display: flex; gap: 4px; }
  .s-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--surface2); }
  .s-dot.w { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .s-dot.l { background: var(--red); }

  .btn-go {
    width: 100%;
    padding: 20px;
    border: none;
    border-radius: 18px;
    font-family: 'Outfit';
    font-size: 16px;
    font-weight: 800;
    color: #fff;
    background: linear-gradient(135deg, var(--accent), #0891b2);
    box-shadow: 0 8px 25px rgba(6,182,212,.2);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .btn-go:active { transform: translateY(2px); }
  .btn-go:disabled { opacity: .5; }

  .ld { display: none; width: 22px; height: 22px; border: 3px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: sp .8s linear infinite; }
  .btn-go.loading .ld { display: inline-block; }
  .btn-go.loading .bt { display: none; }
  @keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">CAVE<span>MINES</span></div>
  </div>

  <div class="grid-wrapper">
    <div class="grid-label">Поле 5×5</div>
    <div class="traps-row">
      <div class="traps-label">Ловушек:</div>
      <button class="traps-btn" onclick="changeTraps(-1)">−</button>
      <div class="traps-val" id="trapsVal">3</div>
      <button class="traps-btn" onclick="changeTraps(1)">+</button>
    </div>
    <div class="mine-grid" id="mineGrid"></div>
    <div class="grid-info" id="gridInfo">Нажми кнопку для получения сигнала</div>
  </div>

  <div class="result-block" id="resBlock">
    <button class="res-btn win" onclick="record(true)">✅ Выиграл</button>
    <button class="res-btn lose" onclick="record(false)">❌ Проиграл</button>
  </div>

  <div class="streak" id="streakBar">
    <div class="streak-txt">Серия побед: <strong id="strCnt">0</strong></div>
    <div class="streak-dots" id="strDots"></div>
  </div>

  <button class="btn-go" id="btnGo" onclick="getSignal()">
    <span class="bt">💎 Получить сигнал</span>
    <span class="ld"></span>
  </button>
</div>

<script>
  let streak = 0, results = [], active = false, traps = 3;

  function buildGrid() {
    const grid = document.getElementById('mineGrid');
    grid.innerHTML = '';
    for (let i = 0; i < 25; i++) {
      const cell = document.createElement('div');
      cell.className = 'mine-cell hidden';
      cell.id = 'cell' + i;
      cell.innerHTML = '<span></span>';
      grid.appendChild(cell);
    }
  }

  function changeTraps(delta) {
    if (active) return;
    traps = Math.max(1, Math.min(15, traps + delta));
    document.getElementById('trapsVal').textContent = traps;
  }

  function getSignal() {
    if (active) return;
    const btn = document.getElementById('btnGo'), 
          info = document.getElementById('gridInfo'), 
          rb = document.getElementById('resBlock');
          
    btn.classList.add('loading');
    btn.disabled = true;
    rb.classList.remove('visible');
    buildGrid();

    setTimeout(() => {
      let bombSet = new Set();
      while (bombSet.size < traps) bombSet.add(Math.floor(Math.random() * 25));
      
      let delay = 0;
      for (let i = 0; i < 25; i++) {
        (function(idx) {
          setTimeout(() => {
            const cell = document.getElementById('cell' + idx);
            const isBomb = bombSet.has(idx);
            cell.classList.remove('hidden');
            cell.classList.add(isBomb ? 'bomb' : 'safe');
            cell.querySelector('span').textContent = isBomb ? '💣' : '💎';
          }, delay);
        })(i);
        delay += 30;
      }

      setTimeout(() => {
        info.innerHTML = `<strong>${25-traps}</strong> безопасных клеток`;
        btn.classList.remove('loading');
        btn.disabled = false;
        active = true;
        rb.classList.add('visible');
      }, delay + 200);
    }, 1500);
  }

  function record(won) {
    active = false;
    document.getElementById('resBlock').classList.remove('visible');
    
    if (won) streak++; else streak = 0;
    results.push(won);
    if (results.length > 8) results.shift();

    const sb = document.getElementById('streakBar');
    sb.classList.add('visible');
    document.getElementById('strCnt').textContent = streak;
    
    const sd = document.getElementById('strDots');
    sd.innerHTML = '';
    results.forEach(res => {
      const d = document.createElement('div');
      d.className = 's-dot ' + (res ? 'w' : 'l');
      sd.appendChild(d);
    });
    
    document.getElementById('gridInfo').textContent = 'Нажми кнопку для нового сигнала';
  }

  buildGrid();
</script>
</body>
</html>

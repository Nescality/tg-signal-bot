<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Signal Bot</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a10;
    --surface: #12121c;
    --surface2: #1a1a28;
    --border: rgba(255,255,255,0.06);
    --text: #e8e6f0;
    --text-sec: #7a7890;
    --text-muted: #4a4860;
    --green: #34d399;
    --green-soft: rgba(52,211,153,0.1);
    --purple: #a78bfa;
    --purple-soft: rgba(167,139,250,0.08);
    --cyan: #22d3ee;
    --amber: #fbbf24;
    --rose: #fb7185;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .page { max-width: 800px; margin: 0 auto; padding: 28px 20px 48px; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 10px rgba(52,211,153,0.4);
  }
  .header-title { font-size: 18px; font-weight: 800; }
  .header-time { font-size: 12px; color: var(--text-muted); font-weight: 600; }

  .tabs {
    display: flex; gap: 4px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 4px; margin-bottom: 24px;
  }
  .tab {
    flex: 1; padding: 8px 4px; text-align: center;
    font-size: 12px; font-weight: 700; color: var(--text-muted);
    border-radius: 8px; cursor: pointer; transition: all 0.2s;
    border: none; background: none; font-family: 'Manrope', sans-serif;
  }
  .tab:hover { color: var(--text-sec); }
  .tab.active {
    background: var(--surface2); color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .cards {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-bottom: 24px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px 16px;
  }
  .card-label {
    font-size: 11px; color: var(--text-muted);
    font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .card-value {
    font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700;
  }
  .card-value.green { color: var(--green); }
  .card-value.purple { color: var(--purple); }
  .card-value.cyan { color: var(--cyan); }
  .card-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight: 600; }
  .card-sub .up { color: var(--green); }

  .chart-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px; margin-bottom: 20px;
  }
  .chart-title {
    font-size: 13px; font-weight: 700; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .chart-title .dot { width: 8px; height: 8px; border-radius: 50%; }
  .chart-title .dot.green { background: var(--green); }
  .chart-title .dot.purple { background: var(--purple); }
  .chart-wrap { height: 220px; position: relative; }

  .lang-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
  }
  .lang-title { font-size: 13px; font-weight: 700; margin-bottom: 14px; }
  .lang-list { display: flex; flex-direction: column; gap: 8px; }
  .lang-row { display: flex; align-items: center; gap: 10px; }
  .lang-flag { font-size: 18px; width: 28px; text-align: center; }
  .lang-name { font-size: 13px; font-weight: 600; width: 80px; }
  .lang-bar-bg {
    flex: 1; height: 8px; background: var(--surface2);
    border-radius: 4px; overflow: hidden;
  }
  .lang-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .lang-count {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700;
    color: var(--text-sec); min-width: 40px; text-align: right;
  }
  .lang-pct {
    font-size: 11px; color: var(--text-muted); min-width: 40px; text-align: right;
  }

  .no-data {
    text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px;
  }

  @media (max-width: 500px) {
    .cards { grid-template-columns: 1fr; }
    .card-value { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div class="header-left">
      <div class="header-dot"></div>
      <div class="header-title">Signal Bot Dashboard</div>
    </div>
    <div class="header-time" id="headerTime"></div>
  </div>

  <div id="content">
    <div class="tabs" id="tabs">
      <button class="tab" data-period="day">День</button>
      <button class="tab" data-period="week">Неделя</button>
      <button class="tab active" data-period="month">Месяц</button>
      <button class="tab" data-period="half_year">Полгода</button>
      <button class="tab" data-period="year">Год</button>
      <button class="tab" data-period="all">Всё</button>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-label">Регистрации</div>
        <div class="card-value green" id="totalUsers">0</div>
        <div class="card-sub" id="totalSub"></div>
      </div>
      <div class="card">
        <div class="card-label">Верифицировано</div>
        <div class="card-value purple" id="verifiedUsers">0</div>
        <div class="card-sub" id="verifiedSub"></div>
      </div>
      <div class="card">
        <div class="card-label">Конверсия</div>
        <div class="card-value cyan" id="conversion">0%</div>
        <div class="card-sub">регистрация → верификация</div>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-title"><span class="dot green"></span>Регистрации по дням</div>
      <div class="chart-wrap"><canvas id="regChart"></canvas></div>
    </div>

    <div class="chart-section">
      <div class="chart-title"><span class="dot purple"></span>Верификации по дням</div>
      <div class="chart-wrap"><canvas id="verChart"></canvas></div>
    </div>

    <div class="lang-section">
      <div class="lang-title">🌐 Распределение по языкам</div>
      <div class="lang-list" id="langList"></div>
    </div>
  </div>

  <div class="no-data" id="noData" style="display:none;">
    Нет данных. Открой эту ссылку через кнопку в админ-боте.
  </div>
</div>

<script>
  // ===== Читаем данные из URL hash =====
  // Бот генерирует ссылку: https://username.github.io/dashboard/#BASE64_DATA
  // Здесь мы декодируем base64 → JSON

  let DATA = null;

  try {
    const hash = window.location.hash.slice(1); // убираем #
    if (hash) {
      const json = decodeURIComponent(atob(hash));
      DATA = JSON.parse(json);
    }
  } catch (e) {
    console.error("Ошибка декодирования данных:", e);
  }

  // Если данных нет — показываем заглушку
  if (!DATA) {
    document.getElementById('content').style.display = 'none';
    document.getElementById('noData').style.display = 'block';
  }

  // ===== Извлекаем данные =====
  const STATS = DATA ? DATA.stats : null;
  const REG_BY_DAY = DATA ? DATA.reg : [];
  const VER_BY_DAY = DATA ? DATA.ver : [];
  const ALL_STATS = DATA ? DATA.all : null;
  const allPeriodStats = DATA ? DATA.periods : {};

  let currentStats = STATS;

  // ===== Время =====
  document.getElementById('headerTime').textContent =
    new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });

  // ===== Карточки =====
  function updateCards(stats) {
    if (!stats) return;
    currentStats = stats;
    document.getElementById('totalUsers').textContent = stats.total.toLocaleString();
    document.getElementById('verifiedUsers').textContent = stats.verified.toLocaleString();
    const conv = stats.total > 0 ? ((stats.verified / stats.total) * 100).toFixed(1) : 0;
    document.getElementById('conversion').textContent = conv + '%';

    if (ALL_STATS) {
      const pctOfAll = ALL_STATS.total > 0
        ? ((stats.total / ALL_STATS.total) * 100).toFixed(0) : 100;
      document.getElementById('totalSub').innerHTML =
        `<span class="up">${pctOfAll}%</span> от общего`;
    }
  }
  if (STATS) updateCards(STATS);

  // ===== Табы =====
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const period = tab.dataset.period;
      if (allPeriodStats[period]) {
        updateCards(allPeriodStats[period]);
        updateLangs(allPeriodStats[period].langs, allPeriodStats[period].total);
      }
    });
  });

  // ===== Графики =====
  const chartCfg = {
    green: { line: '#34d399', bg: 'rgba(52,211,153,0.08)' },
    purple: { line: '#a78bfa', bg: 'rgba(167,139,250,0.08)' },
  };

  function makeChart(id, data, color) {
    if (!data || data.length === 0) return;
    const ctx = document.getElementById(id).getContext('2d');
    return new Chart(ctx, {
      type: 'line',
      data: {
        labels: data.map(d => {
          const dt = new Date(d.date);
          return dt.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        }),
        datasets: [{
          data: data.map(d => d.count),
          borderColor: chartCfg[color].line,
          backgroundColor: chartCfg[color].bg,
          borderWidth: 2, fill: true, tension: 0.35,
          pointRadius: 3, pointHoverRadius: 6,
          pointBackgroundColor: chartCfg[color].line,
          pointBorderColor: '#0a0a10', pointBorderWidth: 2,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1a28', titleColor: '#e8e6f0', bodyColor: '#e8e6f0',
            borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
            padding: 10, cornerRadius: 8,
            titleFont: { family: 'Manrope', weight: '700' },
            bodyFont: { family: 'JetBrains Mono', weight: '700' },
          },
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.03)' },
            ticks: { color: '#4a4860', font: { family: 'Manrope', size: 10, weight: '600' }, maxRotation: 0, maxTicksLimit: 10 },
            border: { display: false },
          },
          y: {
            grid: { color: 'rgba(255,255,255,0.03)' },
            ticks: { color: '#4a4860', font: { family: 'JetBrains Mono', size: 10, weight: '600' }, stepSize: 1 },
            border: { display: false }, beginAtZero: true,
          },
        },
      },
    });
  }

  makeChart('regChart', REG_BY_DAY, 'green');
  makeChart('verChart', VER_BY_DAY, 'purple');

  // ===== Языки =====
  const langFlags = { ru:'🇷🇺',en:'🇬🇧',hi:'🇮🇳',br:'🇧🇷',es:'🇪🇸',uz:'🇺🇿',az:'🇦🇿',tr:'🇹🇷',pt:'🇵🇹',ar:'🇸🇦' };
  const langNames = { ru:'Русский',en:'English',hi:'Hindi',br:'Brazilian',es:'Español',uz:"O'zbek",az:'Azərbaycan',tr:'Türkçe',pt:'Português',ar:'العربية' };
  const barColors = ['#34d399','#a78bfa','#22d3ee','#fbbf24','#fb7185','#f97316','#818cf8','#a3e635','#e879f9','#38bdf8'];

  function updateLangs(langs, total) {
    const list = document.getElementById('langList');
    list.innerHTML = '';
    if (!langs || langs.length === 0) {
      list.innerHTML = '<div style="color:var(--text-muted);font-size:12px;">Нет данных</div>';
      return;
    }
    const maxCnt = langs[0].cnt;
    langs.forEach((l, i) => {
      const pct = total > 0 ? ((l.cnt / total) * 100).toFixed(1) : 0;
      const barW = maxCnt > 0 ? ((l.cnt / maxCnt) * 100) : 0;
      const row = document.createElement('div');
      row.className = 'lang-row';
      row.innerHTML = `
        <div class="lang-flag">${langFlags[l.lang] || '🏳'}</div>
        <div class="lang-name">${langNames[l.lang] || l.lang}</div>
        <div class="lang-bar-bg">
          <div class="lang-bar-fill" style="width:${barW}%;background:${barColors[i % barColors.length]}"></div>
        </div>
        <div class="lang-count">${l.cnt}</div>
        <div class="lang-pct">${pct}%</div>
      `;
      list.appendChild(row);
    });
  }
  if (STATS) updateLangs(STATS.langs, STATS.total);
</script>
</body>
</html>
